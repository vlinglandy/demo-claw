<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>demo - Claw Deploy</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #111827, #2563eb);
      color: white;
    }
    main {
      padding: 40px;
      border-radius: 24px;

      backdrop-filter: blur(12px);

    h1 { margin: 0 0 12px; font-size: clamp(32px, 6vw, 64px); }
    p { margin: 0; font-size: 22px; opacity: 0.92; }

  <main>
